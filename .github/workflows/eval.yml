name: RAG Evaluation Gate

on:
  push:
    branches: [main, develop]
    paths:
      - "src/docustra/retrieval/**"
      - "src/docustra/ingestion/**"
      - "prompts/**"
      - "data/eval/**"
      - "scripts/eval_ci.py"
  pull_request:
    branches: [main]
    paths:
      - "src/docustra/retrieval/**"
      - "src/docustra/ingestion/**"
      - "prompts/**"
      - "data/eval/**"
      - "scripts/eval_ci.py"
  workflow_dispatch:
    inputs:
      sample_size:
        description: "Number of QA pairs to evaluate (default: 25 for speed)"
        required: false
        default: "25"
      pattern:
        description: "RAG pattern to evaluate"
        required: false
        default: "hybrid"

jobs:
  rag-eval:
    name: RAG Evaluation (${{ matrix.pattern }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        pattern: [hybrid, corrective, adaptive]

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        # No Docker-level health check — curl/wget not guaranteed in the Qdrant image.
        # Readiness is handled by the explicit "Wait for Qdrant" step below.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install additional eval dependencies
        run: |
          # Pin ragas <0.3.0: the 0.3+ rewrite requires explicit OpenAI credentials.
          # 0.1.x–0.2.x uses LangChain natively (respects GOOGLE_API_KEY / GROQ_API_KEY).
          uv pip install rank-bm25 sentence-transformers "ragas>=0.1.0,<0.3.0"
          # Compatibility shim: ragas ≤0.4.x imports langchain_community.chat_models.vertexai
          # which was removed in langchain-community 0.3+. The shim is also applied at
          # runtime in metrics.py, but we create the file here too for belt-and-suspenders.
          uv run python - <<'PYEOF'
          import sys, types, site, os
          missing = "langchain_community.chat_models.vertexai"
          sp = site.getsitepackages()[0]
          shim_path = os.path.join(sp, "langchain_community", "chat_models", "vertexai.py")
          if not os.path.exists(shim_path):
              with open(shim_path, "w") as f:
                  f.write('"""Compatibility shim for ragas."""\nclass ChatVertexAI:\n    pass\n')
              print(f"Created shim at {shim_path}")
          else:
              print("Shim already exists — skipping")
          PYEOF

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/healthz 2>/dev/null || \
               wget -qO- http://localhost:6333/healthz 2>/dev/null; then
              echo "Qdrant ready after ${i} attempts"
              break
            fi
            echo "Waiting for Qdrant... attempt $i"
            sleep 3
          done

      - name: Ingest evaluation documents
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'groq' }}
          QDRANT_URL: http://localhost:6333
        run: |
          uv run python scripts/ingest_sample_data.py || echo "Ingestion script not found, skipping"

      - name: Check API credentials
        run: |
          if [ -z "${{ secrets.GOOGLE_API_KEY }}" ] && [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "⚠️  No LLM API keys found in GitHub Secrets."
            echo "    Add GOOGLE_API_KEY or GROQ_API_KEY in:"
            echo "    Settings → Secrets and variables → Actions → New repository secret"
            echo "SKIP_EVAL=true" >> $GITHUB_ENV
          else
            echo "SKIP_EVAL=false" >> $GITHUB_ENV
          fi

      - name: Run RAG evaluation
        id: eval
        if: env.SKIP_EVAL == 'false'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'groq' }}
          QDRANT_URL: http://localhost:6333
          EVAL_FAITHFULNESS_THRESHOLD: "0.70"
          EVAL_ANSWER_RELEVANCY_THRESHOLD: "0.70"
          EVAL_CONTEXT_PRECISION_THRESHOLD: "0.60"
        run: |
          SAMPLE=${{ github.event.inputs.sample_size || '25' }}
          PATTERN=${{ matrix.pattern }}
          uv run python scripts/eval_ci.py \
            --pattern $PATTERN \
            --sample $SAMPLE \
            --output eval_results_${PATTERN}.json

      - name: Skip notice
        if: env.SKIP_EVAL == 'true'
        run: |
          echo "## ⚠️ RAG Evaluation Skipped — No API keys" >> $GITHUB_STEP_SUMMARY
          echo "Add GOOGLE_API_KEY or GROQ_API_KEY to repo secrets to enable evaluation." >> $GITHUB_STEP_SUMMARY

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ matrix.pattern }}
          path: eval_results_${{ matrix.pattern }}.json
          retention-days: 30

      - name: Post evaluation summary
        if: always()
        run: |
          if [ -f "eval_results_${{ matrix.pattern }}.json" ]; then
            echo "## RAG Evaluation: ${{ matrix.pattern }}" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat eval_results_${{ matrix.pattern }}.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(json.dumps({'scores': d['scores'], 'passed': d['passed']}, indent=2))
          " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  lint-prompts:
    name: Validate prompt YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PyYAML
        run: pip install pyyaml --quiet
      - name: Validate all prompt YAML files
        run: |
          python3 - <<'EOF'
          import yaml
          import sys
          from pathlib import Path
          errors = []
          for f in Path("prompts").rglob("*.yaml"):
              try:
                  with open(f) as fh:
                      data = yaml.safe_load(fh)
                  print(f"  ✓ {f}")
              except yaml.YAMLError as e:
                  errors.append(f"  ✗ {f}: {e}")
          if errors:
              print("\nYAML validation failures:")
              for e in errors:
                  print(e)
              sys.exit(1)
          print(f"\nAll {len(list(Path('prompts').rglob('*.yaml')))} prompt files valid.")
          EOF
