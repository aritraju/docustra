<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1E"/>
      <stop offset="100%" style="stop-color:#0D1426"/>
    </linearGradient>

    <!-- Primary indigo→cyan gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>

    <!-- Soft glow gradient for cards -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.05"/>
    </linearGradient>

    <!-- Subtle radial glow left -->
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>

    <!-- Subtle radial glow right -->
    <radialGradient id="glowRight" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>

    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#2D3748" opacity="0.6"/>
    </pattern>

    <!-- Clip for rounded corners -->
    <clipPath id="rounded">
      <rect width="1200" height="628" rx="0"/>
    </clipPath>

    <!-- Gradient text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366F1" flood-opacity="0.3"/>
    </filter>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="628" fill="url(#bgGrad)"/>
  <rect width="1200" height="628" fill="url(#dots)" opacity="0.4"/>
  <rect width="1200" height="628" fill="url(#glowLeft)"/>
  <rect width="1200" height="628" fill="url(#glowRight)"/>

  <!-- ── Decorative arc lines ── -->
  <circle cx="1100" cy="-80" r="280" fill="none" stroke="url(#mainGrad)" stroke-width="1" opacity="0.15"/>
  <circle cx="1100" cy="-80" r="360" fill="none" stroke="url(#mainGrad)" stroke-width="1" opacity="0.1"/>
  <circle cx="100"  cy="750" r="260" fill="none" stroke="url(#mainGrad)" stroke-width="1" opacity="0.12"/>

  <!-- ── Left accent bar ── -->
  <rect x="64" y="80" width="4" height="468" rx="2" fill="url(#mainGrad)" opacity="0.7"/>

  <!-- ── Hero tag ── -->
  <rect x="88" y="80" width="190" height="30" rx="15" fill="url(#cardGrad)" stroke="url(#mainGrad)" stroke-width="1" opacity="0.9"/>
  <text x="183" y="100" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="2" fill="url(#textGrad)" text-anchor="middle" dominant-baseline="middle">PORTFOLIO PROJECT</text>

  <!-- ── Main title ── -->
  <text x="88" y="175" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="88" font-weight="800" fill="white" letter-spacing="-3" filter="url(#shadow)">Docustra</text>

  <!-- ── Gradient underline ── -->
  <rect x="88" y="193" width="480" height="4" rx="2" fill="url(#mainGrad)"/>

  <!-- ── Subtitle ── -->
  <text x="88" y="240" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="400" fill="#94A3B8" letter-spacing="0.3">Enterprise Document Intelligence Platform</text>

  <!-- ── Description ── -->
  <text x="88" y="282" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#64748B" letter-spacing="0.2">Production-grade RAG showcase · FastAPI · Qdrant · LangGraph · Neo4j</text>

  <!-- ═══════════════════════════════════ -->
  <!-- ── Feature pills row 1 ── -->
  <!-- ═══════════════════════════════════ -->

  <!-- Pill 1: 8 RAG Patterns -->
  <rect x="88" y="326" width="210" height="42" rx="21" fill="rgba(99,102,241,0.15)" stroke="#6366F1" stroke-width="1.5"/>
  <text x="193" y="352" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#818CF8" text-anchor="middle">🔀  8 RAG Patterns</text>

  <!-- Pill 2: 10 Chunking Strategies -->
  <rect x="312" y="326" width="248" height="42" rx="21" fill="rgba(6,182,212,0.12)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="436" y="352" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#22D3EE" text-anchor="middle">✂️  10 Chunking Strategies</text>

  <!-- Pill 3: Vector DB -->
  <rect x="574" y="326" width="190" height="42" rx="21" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1.5"/>
  <text x="669" y="352" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#34D399" text-anchor="middle">🗄️  Qdrant + Neo4j</text>

  <!-- ── Feature pills row 2 ── -->
  <!-- Pill 4: Adaptive -->
  <rect x="88" y="382" width="164" height="36" rx="18" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="170" y="404" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#818CF8" text-anchor="middle">Adaptive RAG</text>

  <!-- Pill 5: Agentic -->
  <rect x="264" y="382" width="148" height="36" rx="18" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="338" y="404" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#22D3EE" text-anchor="middle">Agentic RAG</text>

  <!-- Pill 6: Graph RAG -->
  <rect x="424" y="382" width="148" height="36" rx="18" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="498" y="404" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#34D399" text-anchor="middle">Graph RAG</text>

  <!-- Pill 7: Self-RAG -->
  <rect x="584" y="382" width="136" height="36" rx="18" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
  <text x="652" y="404" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#FCA5A5" text-anchor="middle">Self-RAG</text>

  <!-- Pill 8: HyDE -->
  <rect x="732" y="382" width="104" height="36" rx="18" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="784" y="404" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#FCD34D" text-anchor="middle">HyDE</text>

  <!-- ── Tech stack ── -->
  <text x="88" y="458" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="2" fill="#475569">BUILT WITH</text>

  <!-- Stack badges -->
  <!-- Python -->
  <rect x="88" y="472" width="86" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="131" y="490" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">🐍 Python</text>

  <!-- FastAPI -->
  <rect x="184" y="472" width="86" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="227" y="490" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">⚡ FastAPI</text>

  <!-- LangChain -->
  <rect x="280" y="472" width="104" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="332" y="490" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">🦜 LangChain</text>

  <!-- LangGraph -->
  <rect x="394" y="472" width="104" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="446" y="490" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">🕸 LangGraph</text>

  <!-- Qdrant -->
  <rect x="508" y="472" width="84" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="550" y="490" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">🗄 Qdrant</text>

  <!-- Neo4j -->
  <rect x="602" y="472" width="80" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="642" y="490" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">🔗 Neo4j</text>

  <!-- Streamlit -->
  <rect x="692" y="472" width="96" height="28" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="740" y="490" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">🎈 Streamlit</text>

  <!-- ── GitHub link ── -->
  <text x="88" y="552" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#475569">github.com/aritraju/docustra</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── RIGHT PANEL — Visual card ── -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Main card -->
  <rect x="820" y="60" width="320" height="508" rx="16" fill="#111827" stroke="#2D3748" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Card top gradient bar -->
  <rect x="820" y="60" width="320" height="5" rx="2" fill="url(#mainGrad)"/>

  <!-- Card header -->
  <text x="980" y="102" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="2" fill="#475569" text-anchor="middle">RAG PIPELINE</text>

  <!-- ── Pipeline flow diagram ── -->
  <!-- Step 1: PDF -->
  <rect x="870" y="118" width="220" height="44" rx="10" fill="#1C2436" stroke="#2D3748" stroke-width="1"/>
  <text x="980" y="134" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#6366F1" text-anchor="middle">INPUT</text>
  <text x="980" y="151" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F1F5F9" text-anchor="middle">📄 PDF / Document</text>

  <!-- Arrow -->
  <line x1="980" y1="162" x2="980" y2="182" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="980,186 975,176 985,176" fill="#2D3748"/>

  <!-- Step 2: Parse + Chunk -->
  <rect x="870" y="188" width="220" height="44" rx="10" fill="#1C2436" stroke="#2D3748" stroke-width="1"/>
  <text x="980" y="204" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#06B6D4" text-anchor="middle">CHUNK</text>
  <text x="980" y="221" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F1F5F9" text-anchor="middle">✂️  10 Strategies</text>

  <!-- Arrow -->
  <line x1="980" y1="232" x2="980" y2="252" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="980,256 975,246 985,246" fill="#2D3748"/>

  <!-- Step 3: Embed -->
  <rect x="870" y="258" width="220" height="44" rx="10" fill="#1C2436" stroke="#2D3748" stroke-width="1"/>
  <text x="980" y="274" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#10B981" text-anchor="middle">EMBED</text>
  <text x="980" y="291" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F1F5F9" text-anchor="middle">🧮 Sentence-BERT</text>

  <!-- Arrow -->
  <line x1="980" y1="302" x2="980" y2="322" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="980,326 975,316 985,316" fill="#2D3748"/>

  <!-- Step 4: Store -->
  <rect x="870" y="328" width="220" height="44" rx="10" fill="#1C2436" stroke="#2D3748" stroke-width="1"/>
  <text x="980" y="344" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#F59E0B" text-anchor="middle">STORE</text>
  <text x="980" y="361" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F1F5F9" text-anchor="middle">🗄️ Qdrant + Neo4j</text>

  <!-- Arrow -->
  <line x1="980" y1="372" x2="980" y2="392" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="980,396 975,386 985,386" fill="#2D3748"/>

  <!-- Step 5: Retrieve -->
  <rect x="870" y="398" width="220" height="44" rx="10" fill="url(#cardGrad)" stroke="#6366F1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="980" y="414" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#818CF8" text-anchor="middle">RETRIEVE</text>
  <text x="980" y="431" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F1F5F9" text-anchor="middle">🔀 8 RAG Patterns</text>

  <!-- Arrow -->
  <line x1="980" y1="442" x2="980" y2="462" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <polygon points="980,466 975,456 985,456" fill="#6366F1" opacity="0.7"/>

  <!-- Step 6: Answer -->
  <rect x="870" y="468" width="220" height="44" rx="10" fill="url(#mainGrad)" filter="url(#shadow)"/>
  <text x="980" y="484" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">OUTPUT</text>
  <text x="980" y="501" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">✅ Grounded Answer</text>

  <!-- ── Bottom bar ── -->
  <rect x="0" y="590" width="1200" height="38" fill="#0D1120"/>
  <text x="88" y="613" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#334155">github.com/aritraju/docustra</text>
  <text x="1112" y="613" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#334155" text-anchor="end">#RAG #GenAI #LLM #Python #DataEngineering</text>

  <!-- ── Corner accent dots ── -->
  <circle cx="64" cy="60"  r="4" fill="url(#mainGrad)" opacity="0.8"/>
  <circle cx="64" cy="548" r="4" fill="url(#mainGrad)" opacity="0.8"/>
</svg>
